# ─────────────────────────────────────────────────────
# CI/CD Pipeline — core-banking-service
# Trigger: Push to main branch
# Jobs: Build → Push to Docker Hub → Deploy to K8s
# Author: Kumar Sai Chandra
# ─────────────────────────────────────────────────────

name: CI/CD — Banking Microservices

# ── When to trigger this pipeline ──────────────────
on:
  push:
    branches:
      - main                    # Trigger on push to main
    paths:
      - 'core-banking-service/**'  # Only when this service changes
  workflow_dispatch:            # Allow manual trigger too

# ── Environment variables ───────────────────────────
env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/core-banking-service
  K8S_DEPLOYMENT: core-banking-service
  K8S_NAMESPACE: banking

# ── Jobs ────────────────────────────────────────────
jobs:

  # ── JOB 1: BUILD ──────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest       # GitHub hosted runner

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'  # Same as our Docker base image!

      # Step 3: Cache Gradle dependencies
      # This speeds up subsequent builds significantly
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: Give execute permission to gradlew
      - name: Grant execute permission to gradlew
        run: chmod +x core-banking-service/gradlew

      # Step 5: Build the JAR (skip tests for speed)
      - name: Build with Gradle
        working-directory: core-banking-service
        run: ./gradlew clean build -x test --no-daemon

      # Step 6: Upload JAR as artifact for next job
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-banking-jar
          path: core-banking-service/build/libs/*.jar
          retention-days: 1

  # ── JOB 2: DOCKER PUSH ────────────────────────────
  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build                 # Waits for build job to complete ✅

    steps:
      # Step 1: Get the code again
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Download JAR from build job
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: core-banking-jar
          path: core-banking-service/build/libs/

      # Step 3: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Set up Docker Buildx (for better builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Build and push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./core-banking-service
          file: ./core-banking-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # Tags with both latest and commit SHA
          # SHA tag lets you rollback to specific commit!

  # ── JOB 3: DEPLOY TO K8S ─────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-push           # Waits for image to be pushed ✅

    steps:
      # Step 1: SSH into EC2 and deploy
      - name: Deploy to K8s on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            # Restart K8s deployment with new image
            kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
              ${{ env.K8S_DEPLOYMENT }}=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
              -n ${{ env.K8S_NAMESPACE }}

            # Wait for rollout to complete
            kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
              -n ${{ env.K8S_NAMESPACE }}

            # Verify pod is running
            kubectl get pods -n ${{ env.K8S_NAMESPACE }} | grep ${{ env.K8S_DEPLOYMENT }}