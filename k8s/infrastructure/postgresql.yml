# postgresql.yml — PVC + Deployment + Service
# PersistentVolumeClaim — stores PostgreSQL data permanently
apiVersion : v1
kind : PersistentVolumeClaim
metadata : 
  name : postgres-pvc
  namespace : banking
spec : 
  accessModes :
    - ReadWriteOnce
  resources : 
    requests : 
      storage : 512Mi

---
# PostgreSQL Deployment
apiVersion : apps/v1
kind : Deployment 
metadata :
  name : postgresql
  namespace : banking
  labels : 
    app : postgresql
spec :
  replicas : 1
  selector :
    matchLabels :
      app : postgresql
  template :
    metadata :
      labels :
        app : postgresql
    spec:
      containers:
      - name: postgres
        image: postgres:15        # Official PostgreSQL image
        ports:
        - containerPort: 5432     # PostgreSQL default port
        env:
        - name: POSTGRES_DB
          value: keycloak_db      # Database Keycloak will use
        - name: POSTGRES_USER
          value: keycloak         # Must match KC_DB_USERNAME in keycloak.yml
        - name: POSTGRES_PASSWORD
          value: keycloak         # Must match KC_DB_PASSWORD in keycloak.yml
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data  # PostgreSQL data directory
        readinessProbe:
          exec:
            command: [pg_isready, -U, keycloak]  # Check DB accepts connections
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service  
apiVersion: v1
kind: Service
metadata:
  name: postgres                  # Keycloak connects using: postgres:5432
  namespace: banking
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
